<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rurutia</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preload" as="font" type="font/woff2" href="/vendor/fonts/maple/MapleMono-Regular.woff2" crossorigin />
  <link rel="stylesheet" href="/style.css" />
  <!-- 二次开发追加：UI 视觉补丁（拖拽区/按钮重绘/整体打磨），盖在 style.css 之后，零侵入 -->
  <link rel="stylesheet" href="/ui-patch.css" />
  <!-- Rurutia「柔和座舱」视觉层：圆角/柔光/仪表用量/文件卡片/终端项目色脊，纯覆盖可整删回退 -->
  <link rel="stylesheet" href="/soft-patch.css" />
  <!-- 内嵌终端（仅桌面 app 启用，浏览器版自动降级）：本地 vendor，离线可用 -->
  <link rel="stylesheet" href="/vendor/xterm/xterm.css" onerror="window.__noXterm=1" />
</head>
<body>
  <div id="app">
    <!-- 侧边栏 -->
    <aside id="sidebar">
      <div class="brand">
        <span class="logo"><img src="/logo.png" alt="Rurutia" /></span>
        <div>
          <div class="brand-name">Rurutia</div>
          <div class="brand-sub">vibe coding cockpit</div>
        </div>
      </div>

      <button id="cmdk-trigger" class="cmdk-trigger">
        <span class="ct-label"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> 搜索全部文件</span>
        <kbd>⌘K</kbd>
      </button>

      <nav class="nav-section">
        <div class="nav-title">快速入口<button class="nav-add" id="add-root" type="button" title="把当前文件夹加入快速入口" aria-label="添加当前文件夹">+</button></div>
        <ul id="roots-list" class="nav-list"></ul>
      </nav>

      <nav class="nav-section">
        <div class="nav-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 收藏</div>
        <ul id="favs-list" class="nav-list"></ul>
      </nav>

      <nav class="nav-section">
        <div class="nav-title" title="最近被 Claude Code / Codex 处理过的项目，自动从两者的本机会话记录扫出来"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> Agent 项目<button class="nav-add" id="add-agent" type="button" title="把当前文件夹加入 Agent 项目" aria-label="添加当前文件夹">+</button></div>
        <ul id="agent-projects-list" class="nav-list"></ul>
      </nav>

      <div id="usage-sec">
        <div class="nav-title" id="usage-toggle" title="Claude Code / Codex 用量——官方限额窗口 + 本机会话日志，不用开着它们">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Agent 用量 <span id="usage-arrow">▸</span>
        </div>
        <div id="usage-body" class="hidden"></div>
      </div>
      <div class="theme-switch" id="theme-switch">
        <div class="theme-switch-label">皮肤</div>
        <div class="theme-seg">
          <button data-skin="warm" title="暖色纸感档案馆">档案</button>
          <button data-skin="terminal" title="终端核 Volt">终端</button>
          <button data-skin="editorial" title="编辑式 · 索引日报">索引</button>
        </div>
      </div>
      <div class="sidebar-foot">本地运行 · 数据不出本机<a id="lang-toggle" class="lang-toggle"></a></div>
      <div id="sidebar-resizer" title="拖动调整侧栏宽度"></div>
    </aside>

    <!-- 主区 -->
    <main id="main">
      <header id="topbar">
        <div class="nav-buttons">
          <button id="btn-sidebar" title="折叠 / 展开侧栏 (⌘B)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg></button>
        </div>
        <nav id="breadcrumb" class="breadcrumb"></nav>
        <div class="topbar-actions">
          <label class="toggle" title="显示隐藏文件">
            <input type="checkbox" id="toggle-hidden" /> 隐藏文件
          </label>
          <div class="seg" id="sort-seg">
            <button data-sort="name" class="active">名称</button>
            <button data-sort="mtime">时间</button>
            <button data-sort="size">大小</button>
          </div>
          <div class="seg" id="view-seg">
            <button data-view="grid" class="active" title="网格">▦</button>
            <button data-view="list" title="列表">☰</button>
          </div>
          <div class="seg" id="gridsize-seg" title="缩略图大小">
            <button data-size="sm" title="小">·</button>
            <button data-size="md" class="active" title="中">▪</button>
            <button data-size="lg" title="大">◼</button>
          </div>
          <button id="btn-skills" class="ghost-btn" title="Skills 透视：本机 Claude Code / Codex 的全部 skills——谁在干活、谁在吃灰、谁在静默失效（再点一下切回文件）"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.8 4.7L18.5 9.5l-4.7 1.8L12 16l-1.8-4.7L5.5 9.5l4.7-1.8z"/><path d="M18.6 14.6l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7z"/></svg></button>
          <button id="btn-changes" class="ghost-btn" title="本会话 agent 改过的文件（点击回看 / diff）"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg><span id="changes-badge" class="changes-badge hidden"></span></button>
          <button id="btn-recent" class="ghost-btn" title="此处最近修改的文件"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
          <button id="btn-terminal" class="ghost-btn" title="在当前目录打开系统终端"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> 终端</button>
        </div>
      </header>

      <div id="main-body">
        <div id="filemgmt">
        <div id="content">
          <div id="file-area"></div>
          <div id="statusbar" class="hidden"></div>
        </div>
        <div id="preview-resizer" class="hidden" title="拖动调整大小"></div>
        <section id="preview" class="hidden">
          <header class="preview-head">
            <div class="preview-title" id="preview-title"></div>
            <div class="preview-actions" id="preview-actions"></div>
            <button id="preview-close" title="关闭">✕</button>
          </header>
          <div class="preview-body" id="preview-body"></div>
          <div class="follow-narration hidden" id="follow-narration"></div>
          <div class="preview-foot" id="preview-foot"></div>
        </section>
        </div>
        <div id="terminal-resizer" class="hidden"></div>
        <section id="terminal-panel" class="hidden">
          <header class="term-head">
            <div class="term-tabs" id="term-tabs"></div>
            <div class="term-actions">
              <button id="term-claude" class="agent-launch" title="启动 Claude Code（跳过权限确认）：空闲终端就地启动，正跑着任务则新开标签"><svg class="term-svg" viewBox="0 0 24 24" fill="currentColor"><path d="m4.7144 15.9555 4.7174-2.6471.079-.2307-.079-.1275h-.2307l-.7893-.0486-2.6956-.0729-2.3375-.0971-2.2646-.1214-.5707-.1215-.5343-.7042.0546-.3522.4797-.3218.686.0608 1.5179.1032 2.2767.1578 1.6514.0972 2.4468.255h.3886l.0546-.1579-.1336-.0971-.1032-.0972L6.973 9.8356l-2.55-1.6879-1.3356-.9714-.7225-.4918-.3643-.4614-.1578-1.0078.6557-.7225.8803.0607.2246.0607.8925.686 1.9064 1.4754 2.4893 1.8336.3643.3035.1457-.1032.0182-.0728-.164-.2733-1.3539-2.4467-1.445-2.4893-.6435-1.032-.17-.6194c-.0607-.255-.1032-.4674-.1032-.7285L6.287.1335 6.6997 0l.9957.1336.419.3642.6192 1.4147 1.0018 2.2282 1.5543 3.0296.4553.8985.2429.8318.091.255h.1579v-.1457l.1275-1.706.2368-2.0947.2307-2.6957.0789-.7589.3764-.9107.7468-.4918.5828.2793.4797.686-.0668.4433-.2853 1.8517-.5586 2.9021-.3643 1.9429h.2125l.2429-.2429.9835-1.3053 1.6514-2.0643.7286-.8196.85-.9046.5464-.4311h1.0321l.759 1.1293-.34 1.1657-1.0625 1.3478-.8804 1.1414-1.2628 1.7-.7893 1.36.0729.1093.1882-.0183 2.8535-.607 1.5421-.2794 1.8396-.3157.8318.3886.091.3946-.3278.8075-1.967.4857-2.3072.4614-3.4364.8136-.0425.0304.0486.0607 1.5482.1457.6618.0364h1.621l3.0175.2247.7892.522.4736.6376-.079.4857-1.2142.6193-1.6393-.3886-3.825-.9107-1.3113-.3279h-.1822v.1093l1.0929 1.0686 2.0035 1.8092 2.5075 2.3314.1275.5768-.3218.4554-.34-.0486-2.2039-1.6575-.85-.7468-1.9246-1.621h-.1275v.17l.4432.6496 2.3436 3.5214.1214 1.0807-.17.3521-.6071.2125-.6679-.1214-1.3721-1.9246L14.38 17.959l-1.1414-1.9428-.1397.079-.674 7.2552-.3156.3703-.7286.2793-.6071-.4614-.3218-.7468.3218-1.4753.3886-1.9246.3157-1.53.2853-1.9004.17-.6314-.0121-.0425-.1397.0182-1.4328 1.9672-2.1796 2.9446-1.7243 1.8456-.4128.164-.7164-.3704.0667-.6618.4008-.5889 2.386-3.0357 1.4389-1.882.929-1.0868-.0062-.1579h-.0546l-6.3385 4.1164-1.1293.1457-.4857-.4554.0608-.7467.2307-.2429 1.9064-1.3114Z"/></svg></button>
              <button id="term-codex" class="agent-launch" title="启动 Codex：空闲终端就地启动，正跑着任务则新开标签"><svg class="term-svg" viewBox="0 0 16 16" fill="currentColor"><path d="M14.949 6.547a3.94 3.94 0 0 0-.348-3.273 4.11 4.11 0 0 0-4.4-1.934A4.1 4.1 0 0 0 8.423.2 4.15 4.15 0 0 0 6.305.086a4.1 4.1 0 0 0-1.891.948 4.04 4.04 0 0 0-1.158 1.753 4.1 4.1 0 0 0-1.563.679A4 4 0 0 0 .554 4.72a3.99 3.99 0 0 0 .502 4.731 3.94 3.94 0 0 0 .346 3.274 4.11 4.11 0 0 0 4.402 1.933c.382.425.852.764 1.377.995.526.231 1.095.35 1.67.346 1.78.002 3.358-1.132 3.901-2.804a4.1 4.1 0 0 0 1.563-.68 4 4 0 0 0 1.14-1.253 3.99 3.99 0 0 0-.506-4.716m-6.097 8.406a3.05 3.05 0 0 1-1.945-.694l.096-.054 3.23-1.838a.53.53 0 0 0 .265-.455v-4.49l1.366.778q.02.011.025.035v3.722c-.003 1.653-1.361 2.992-3.037 2.996m-6.53-2.75a2.95 2.95 0 0 1-.36-2.01l.095.057L5.29 12.09a.53.53 0 0 0 .527 0l3.949-2.246v1.555a.05.05 0 0 1-.022.041L6.473 13.3c-1.454.826-3.311.335-4.15-1.098m-.85-6.94A3.02 3.02 0 0 1 3.07 3.949v3.785a.51.51 0 0 0 .262.451l3.93 2.237-1.366.779a.05.05 0 0 1-.048 0L2.585 9.342a2.98 2.98 0 0 1-1.113-4.094zm11.216 2.571L8.747 5.576l1.362-.776a.05.05 0 0 1 .048 0l3.265 1.86a3 3 0 0 1 1.173 1.207 2.96 2.96 0 0 1-.27 3.2 3.05 3.05 0 0 1-1.36.997V8.279a.52.52 0 0 0-.276-.445m1.36-2.015-.097-.057-3.226-1.855a.53.53 0 0 0-.53 0L6.249 6.153V4.598a.04.04 0 0 1 .019-.04L9.533 2.7a3.07 3.07 0 0 1 3.257.139c.474.325.843.778 1.066 1.303.223.526.289 1.103.191 1.664zM5.503 8.575 4.139 7.8a.05.05 0 0 1-.026-.037V4.049c0-.57.166-1.127.476-1.607s.752-.864 1.275-1.105a3.08 3.08 0 0 1 3.234.41l-.096.054-3.23 1.838a.53.53 0 0 0-.265.455zm.742-1.577 1.758-1 1.762 1v2l-1.755 1-1.762-1z"/></svg></button>
              <button id="term-plain" class="agent-launch" title="普通终端：在当前文件夹新开一个干净的 shell（不带 agent）"><svg class="term-svg" viewBox="0 0 24 24"><defs><mask id="rb-term-mask"><rect width="24" height="24" fill="#fff"/><path d="M7 9.7l2.8 2.3-2.8 2.3M12.3 14.6h4.4" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></mask></defs><rect x="3" y="5" width="18" height="14" rx="3.6" fill="currentColor" mask="url(#rb-term-mask)"/></svg></button>
              <button id="term-wechat" class="agent-launch wechat-btn" title="微信 ClawBot：用微信遥控本机的 Claude Code / Codex（扫码连接，可切换）"><svg class="term-svg" viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-6.656-6.088V8.89c-.135-.01-.27-.027-.407-.03zm-2.53 3.274c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982z"/></svg><span id="wechat-dot" class="wechat-dot hidden"></span></button>
              <button id="file-follow" title="文件跟随：跟着当前终端 tab 的 agent，它改哪个文件，文件区和预览就跟到哪；html/md 边写边出实时预览（手动浏览即自动停）"><svg class="term-svg" viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-6.5 10-6.5S22 12 22 12s-3.5 6.5-10 6.5S2 12 2 12Z" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"/><circle cx="12" cy="12" r="2.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"/></svg></button>
              <button id="term-newtab" title="新终端"><svg class="term-svg" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.9"/></svg></button>
              <button id="term-max" title="终端铺满"><svg class="term-svg" viewBox="0 0 24 24" fill="none"><path d="M9 21H3v-6M15 3h6v6M21 3l-7 7M3 21l7-7" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/></svg></button>
              <button id="term-dock" title="切换 上下 / 左右 布局"><svg class="term-svg" viewBox="0 0 24 24" fill="none"><path d="M4 8h15M16 5l3 3-3 3M20 16H5M8 13l-3 3 3 3" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7"/></svg></button>
              <button id="term-replay" title="终端录像回放 / 导出视频"><svg class="term-svg" viewBox="0 0 24 24" fill="none"><rect x="2.5" y="7" width="13" height="10" rx="2.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"/><path d="M15.5 10.5 21 8v8l-5.5-2.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"/></svg></button>
              <button id="term-mute" title="提示音开关"><svg class="term-svg" viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 7 2 7H4s2-2 2-7" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"/><path d="M10.5 20a1.7 1.7 0 0 0 3 0" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"/></svg></button>
              <button id="term-close" title="收起终端"><svg class="term-svg" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.9"/></svg></button>
            </div>
          </header>
          <div id="xterm-host"></div>
          <!-- 微信 ClawBot：终端内的独立界面（盖在 xterm 之上，自带标题栏 + 目标切换器） -->
          <div id="wechat-view" class="wechat-view hidden"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- 命令面板 -->
  <div id="cmdk" class="cmdk-overlay hidden">
    <div class="cmdk-panel">
      <div class="cmdk-input-wrap">
        <span class="cmdk-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9aa3b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input id="cmdk-input" placeholder="按文件名搜索…   用 “内容:” 前缀搜文件内容，如 “内容:useState”" autocomplete="off" />
        <button id="scope-toggle" class="scope-toggle on" title="切换搜索范围（Tab）">⤢ 全机</button>
        <kbd>ESC</kbd>
      </div>
      <div id="cmdk-hint" class="cmdk-hint">范围：<b id="cmdk-scope"></b> · Tab 切换范围 · ↑↓ 选择 · ↵ 打开 · ⌘↵ 在编辑器打开</div>
      <ul id="cmdk-results" class="cmdk-results"></ul>
    </div>
  </div>

  <!-- 终端录像回放 -->
  <div id="replay-overlay" class="replay-overlay hidden">
    <div class="replay-panel">
      <header class="replay-head">
        <div class="replay-title"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg> 终端录像</div>
        <div class="replay-sub" id="replay-sub">把 agent 干活的全过程压成几十秒回放</div>
        <button id="replay-close" title="关闭 (Esc)">✕</button>
      </header>
      <div class="replay-body">
        <aside class="replay-list" id="replay-list"></aside>
        <div class="replay-stage">
          <div class="replay-screen" id="replay-screen">
            <div id="replay-host" class="replay-host"></div>
            <div class="replay-empty" id="replay-empty">← 左侧选一段录像开始回放</div>
          </div>
          <div class="replay-controls hidden" id="replay-controls">
            <button id="rp-play" class="rp-play" title="播放 / 暂停 (空格)"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
            <span class="rp-time" id="rp-time">0:00 / 0:00</span>
            <input type="range" id="rp-seek" class="rp-seek" min="0" max="1000" value="0" />
            <label class="rp-field" title="把超过这个秒数的「等待空白」压缩掉（agent 思考、安装依赖等长时间静默）">空白封顶
              <select id="rp-idle"><option value="0.3">0.3s</option><option value="0.6">0.6s</option><option value="1" selected>1s</option><option value="2">2s</option><option value="9999">不压</option></select>
            </label>
            <label class="rp-field" title="目标总时长：自动反推倍速，把整段压到这么长">目标时长
              <select id="rp-target"><option value="">原速</option><option value="30">30s</option><option value="60" selected>60s</option><option value="90">90s</option><option value="120">2min</option></select>
            </label>
            <label class="rp-field" title="在目标时长基础上再叠加的倍速">倍速
              <select id="rp-speed"><option value="1" selected>1×</option><option value="1.5">1.5×</option><option value="2">2×</option><option value="3">3×</option><option value="4">4×</option></select>
            </label>
            <label class="rp-field" title="MP4 通用 / GIF 适合发公众号·即刻 / WebM 体积小（GIF·MP4 需本机 ffmpeg）">导出
              <select id="rp-format"><option value="mp4" selected>MP4</option><option value="gif">GIF</option><option value="webm">WebM</option></select>
            </label>
            <button id="rp-export" class="rp-export" title="按当前压缩节奏录制并导出">导出</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <!-- marked / highlight.js：本地 vendor，离线可用，数据不出本机 -->
  <script src="/vendor/marked/marked.min.js" onerror="window.__noMarked=1"></script>
  <link id="hljs-theme" rel="stylesheet" href="/vendor/hljs/styles/github-dark.min.css" onerror="window.__noHljs=1" />
  <script src="/vendor/hljs/highlight.js" onerror="window.__noHljs=1"></script>

  <script src="/vendor/xterm/addon-webgl.js" onerror="window.__noWebgl=1"></script>
  <script src="/vendor/xterm/addon-unicode11.js" onerror="window.__noUnicode11=1"></script>
  <script src="/vendor/xterm/addon-clipboard.js" onerror="window.__noClipboard=1"></script>
  <script src="/i18n-dict.js" onerror="window.__noDict=1"></script>
  <script src="/i18n-dict.zh-TW.js"></script>
  <script src="/i18n-dict.ja.js"></script>
  <script src="/i18n-dict.ko.js"></script>
  <script src="/i18n-dict.fr.js"></script>
  <script src="/i18n-dict.es.js"></script>
  <script src="/i18n.js"></script>
  <script src="/app.js"></script>
  <!-- 追加皮肤补丁：18 套「色所」配色 + 色卡选择器。自包含，唯一对原文件的改动就是这一行 -->

</body>
