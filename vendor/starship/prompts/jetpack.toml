"$schema" = 'https://starship.rs/config-schema.json'

# Jetpack 座舱：双行 + ╭─ ╰─ 连接线的「驾驶舱」式提示符，第一行信息第二行下笔。
add_newline = true
format = """
[╭─](fg:#6c7086)\
$directory\
$git_branch\
$git_status\
$nodejs$python$rust$golang\
$cmd_duration\
$line_break\
[╰─](fg:#6c7086)$character"""

palette = 'jp'

[directory]
style = "bold sky"
truncation_length = 4
truncation_symbol = "…/"
format = "[ $path]($style) "

[git_branch]
symbol = ""
style = "mauve"
format = "[$symbol $branch]($style) "

[git_status]
style = "peach"
format = "([$all_status$ahead_behind]($style)) "

[nodejs]
symbol = ""
style = "green"
format = "[$symbol $version]($style) "

[python]
symbol = ""
style = "yellow"
format = "[$symbol $version]($style) "

[rust]
symbol = ""
style = "peach"
format = "[$symbol $version]($style) "

[golang]
symbol = ""
style = "sky"
format = "[$symbol $version]($style) "

[cmd_duration]
min_time = 2000
style = "overlay1"
format = "[ 󱎫 $duration]($style) "

[character]
success_symbol = "[ ❯](bold green)"
error_symbol = "[ ❯](bold red)"
vimcmd_symbol = "[ ❮](bold green)"

[palettes.jp]
sky = "#89dceb"
mauve = "#cba6f7"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
overlay1 = "#7f849c"
