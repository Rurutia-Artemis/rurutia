"$schema" = 'https://starship.rs/config-schema.json'

# 帕斯特尔药丸（Pastel Powerline）：粉橘蓝渐变的圆角药丸，柔和高级。
format = """
[](#9A348E)\
$os\
$username\
[](bg:#DA627D fg:#9A348E)\
$directory\
[](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[](fg:#FCA17D bg:#86BBD8)\
$nodejs\
$bun\
$c\
$rust\
$golang\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:#86BBD8 bg:#06969A)\
$conda\
[](fg:#06969A bg:#33658A)\
$time\
[ ](fg:#33658A)\
$cmd_duration\
$line_break\
$character"""

[os]
disabled = false
style = "bg:#9A348E fg:#ffffff"

[os.symbols]
Macos = "󰀵"
Linux = "󰌽"
Windows = "󰍲"

[username]
show_always = true
style_user = "bg:#9A348E fg:#ffffff"
style_root = "bg:#9A348E fg:#ffffff"
format = '[ $user]($style)'

[directory]
style = "bg:#DA627D fg:#ffffff"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:#FCA17D"
format = '[[ $symbol $branch ](fg:#1d1d2b bg:#FCA17D)]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[[($all_status$ahead_behind )](fg:#1d1d2b bg:#FCA17D)]($style)'

[nodejs]
symbol = ""
style = "bg:#86BBD8"
format = '[[ $symbol( $version) ](fg:#1d1d2b bg:#86BBD8)]($style)'

[bun]
symbol = ""
style = "bg:#86BBD8"
format = '[[ $symbol( $version) ](fg:#1d1d2b bg:#86BBD8)]($style)'

[python]
symbol = ""
style = "bg:#86BBD8"
format = '[[ $symbol( $version) ](fg:#1d1d2b bg:#86BBD8)]($style)'

[rust]
symbol = ""
style = "bg:#86BBD8"
format = '[[ $symbol( $version) ](fg:#1d1d2b bg:#86BBD8)]($style)'

[golang]
symbol = ""
style = "bg:#86BBD8"
format = '[[ $symbol( $version) ](fg:#1d1d2b bg:#86BBD8)]($style)'

[c]
symbol = " "
style = "bg:#86BBD8"
format = '[[ $symbol( $version) ](fg:#1d1d2b bg:#86BBD8)]($style)'

[java]
symbol = " "
style = "bg:#86BBD8"
format = '[[ $symbol( $version) ](fg:#1d1d2b bg:#86BBD8)]($style)'

[kotlin]
symbol = ""
style = "bg:#86BBD8"
format = '[[ $symbol( $version) ](fg:#1d1d2b bg:#86BBD8)]($style)'

[haskell]
symbol = ""
style = "bg:#86BBD8"
format = '[[ $symbol( $version) ](fg:#1d1d2b bg:#86BBD8)]($style)'

[php]
symbol = ""
style = "bg:#86BBD8"
format = '[[ $symbol( $version) ](fg:#1d1d2b bg:#86BBD8)]($style)'

[conda]
symbol = " "
style = "bg:#06969A"
format = '[[ $symbol$environment ](fg:#ffffff bg:#06969A)]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:#33658A"
format = '[[ ♥ $time ](fg:#ffffff bg:#33658A)]($style)'

[cmd_duration]
min_time = 500
style = "fg:#a0a0b8"
format = "[  $duration ]($style)"

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[❯](bold #a6e3a1)'
error_symbol = '[❯](bold #f38ba8)'
vimcmd_symbol = '[❮](bold #a6e3a1)'
